{{- /*
ExternalSecret for postgres-secret
Syncs PostgreSQL superuser password from AWS SSM.
*/ -}}
{{- if .Values.externalSecrets.wealistSharedSecret.enabled }}
{{- $prefix := .Values.externalSecrets.wealistSharedSecret.parameterPathPrefix }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.wealistSharedSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ $prefix }}/database/superuser-password
{{- end }}
