{{- /*
ExternalSecret for minio-secret
Syncs MinIO credentials from AWS SSM.
*/ -}}
{{- if .Values.externalSecrets.wealistSharedSecret.enabled }}
{{- $prefix := .Values.externalSecrets.wealistSharedSecret.parameterPathPrefix }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-secret
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.wealistSharedSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: ClusterSecretStore
  target:
    name: minio-secret
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: {{ $prefix }}/minio/access-key
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: {{ $prefix }}/minio/root-password
{{- end }}
